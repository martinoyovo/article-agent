<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>article-agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
    <style>
      :root {
        --coral: #ff7a5c;
        --green: #5fb78a;
        --lavender: #a78ecc;
        --ink: #1c1b22;
        --muted: #6b6975;
        --line: #e6e4ea;
        --bg: #faf9fb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", system-ui, sans-serif;
        color: var(--ink);
        background: var(--bg);
        margin: 0;
        line-height: 1.55;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 96px;
      }
      header h1 {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 6px;
      }
      header p {
        color: var(--muted);
        margin: 0 0 32px;
        font-size: 15px;
      }
      form {
        display: grid;
        gap: 16px;
        background: #fff;
        border: 1px solid var(--line);
        padding: 24px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .hint {
        font-weight: 400;
        color: var(--muted);
      }
      input,
      textarea {
        width: 100%;
        font: inherit;
        font-size: 15px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
      }
      input:focus,
      textarea:focus {
        outline: 2px solid var(--lavender);
        outline-offset: -1px;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 160px;
        gap: 16px;
      }
      button {
        font: inherit;
        font-weight: 600;
        font-size: 15px;
        color: #fff;
        background: var(--coral);
        border: none;
        padding: 12px 20px;
        cursor: pointer;
        justify-self: start;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      button:hover {
        background: #f96344;
      }
      button:disabled {
        background: var(--muted);
        cursor: default;
      }
      button .arrow {
        width: 0;
        height: 0;
        border-top: 5px solid transparent;
        border-bottom: 5px solid transparent;
        border-left: 8px solid #fff;
      }
      #progress {
        margin-top: 24px;
        display: none;
        font-size: 14px;
      }
      #progress .step {
        padding: 6px 0;
        color: var(--muted);
        border-bottom: 1px solid var(--line);
      }
      #progress .step.active {
        color: var(--ink);
        font-weight: 600;
      }
      #progress .step .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: var(--green);
        margin-right: 8px;
      }
      .error {
        margin-top: 24px;
        padding: 14px 16px;
        background: #fff0ec;
        border: 1px solid var(--coral);
        color: #a8341c;
        font-size: 14px;
        display: none;
      }
      article {
        margin-top: 40px;
        background: #fff;
        border: 1px solid var(--line);
        padding: 32px;
        display: none;
      }
      article h1 {
        font-size: 26px;
        margin-top: 0;
      }
      article h2,
      article h3 {
        margin-top: 28px;
      }
      article a {
        color: var(--coral);
      }
      article pre {
        background: var(--bg);
        padding: 14px;
        overflow-x: auto;
      }
      .cover {
        display: none;
        margin: 40px 0 0;
      }
      .cover svg {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid var(--line);
      }
      .cover-tools {
        display: none;
        gap: 12px;
        margin-top: 12px;
      }
      .cover-tools button {
        background: var(--green);
        font-size: 13px;
        padding: 8px 14px;
      }
      .cover-tools button:hover {
        background: #4ea577;
      }
      .tools {
        display: none;
        gap: 12px;
        margin-top: 16px;
      }
      .tools button {
        background: var(--lavender);
        font-size: 13px;
        padding: 8px 14px;
      }
      .tools button:hover {
        background: #9579c2;
      }
      .article-figure {
        margin: 28px 0;
      }
      .article-figure svg,
      .fig-preview svg {
        width: 100%;
        height: auto;
        display: block;
      }
      .figures {
        display: none;
        margin-top: 40px;
      }
      .fig-h {
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--muted);
        margin: 0 0 16px;
      }
      .fig-item {
        border: 1px solid var(--line);
        background: #fff;
        padding: 16px;
        margin-bottom: 16px;
      }
      .fig-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 12px;
        flex-wrap: wrap;
      }
      .fig-label {
        font-size: 13px;
        color: var(--muted);
      }
      .fig-btns {
        display: flex;
        gap: 10px;
      }
      .fig-btns button {
        background: var(--green);
        font-size: 13px;
        padding: 7px 12px;
      }
      .fig-btns button:hover {
        background: #4ea577;
      }
      footer {
        margin-top: 48px;
        color: var(--muted);
        font-size: 13px;
        text-align: center;
      }
      footer a {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>article-agent</h1>
        <p>
          Researches the web and writes a cited article in a fixed house voice. Four steps:
          research, outline, draft, style critic.
        </p>
      </header>

      <form id="form">
        <div>
          <label for="topic">Topic</label>
          <textarea id="topic" rows="2" placeholder="why local-first agents matter" required></textarea>
        </div>
        <div class="row">
          <div>
            <label for="audience">Audience <span class="hint">optional</span></label>
            <input id="audience" placeholder="developers and builders" />
          </div>
          <div>
            <label for="length">Length <span class="hint">words</span></label>
            <input id="length" type="number" value="1500" min="400" max="4000" step="100" />
          </div>
        </div>
        <div>
          <label for="key">
            Anthropic API key
            <span class="hint">stays in your browser, sent only with your request</span>
          </label>
          <input id="key" type="password" placeholder="sk-ant-..." autocomplete="off" />
        </div>
        <button id="go" type="submit">
          Generate <span class="arrow"></span>
        </button>
      </form>

      <div id="progress"></div>
      <div id="error" class="error"></div>

      <figure id="cover" class="cover"></figure>
      <div class="cover-tools" id="coverTools">
        <button id="dlPng" type="button">Download cover PNG</button>
        <button id="dlSvg" type="button">Download cover SVG</button>
      </div>

      <article id="article"></article>
      <div class="tools" id="tools">
        <button id="copy" type="button">Copy markdown</button>
        <button id="download" type="button">Download .md</button>
      </div>

      <div class="figures" id="figureList"></div>

      <footer>
        Open source, MIT.
        <a href="https://github.com/martinoyovo/article-agent" target="_blank" rel="noreferrer">
          Source on GitHub
        </a>
      </footer>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const KEY_STORE = "article-agent:key";
      const STEPS = {
        research: "Researching the web",
        outline: "Shaping the outline",
        draft: "Writing the draft",
        graphics: "Designing the cover",
        critic: "Enforcing the house voice",
        figures: "Designing diagrams",
        done: "Done",
      };

      // Remember the key locally so you do not paste it every time.
      $("key").value = localStorage.getItem(KEY_STORE) || "";
      $("key").addEventListener("change", (e) =>
        localStorage.setItem(KEY_STORE, e.target.value.trim()),
      );

      let lastMarkdown = "";
      let lastCoverSvg = "";
      let lastFigures = [];

      function renderProgress(active) {
        const box = $("progress");
        box.style.display = "block";
        box.innerHTML = Object.entries(STEPS)
          .filter(([k]) => k !== "done")
          .map(([k, label]) => {
            const cls = k === active ? "step active" : "step";
            const dot = k === active ? '<span class="dot"></span>' : "";
            return `<div class="${cls}">${dot}${label}</div>`;
          })
          .join("");
      }

      function showError(msg) {
        const el = $("error");
        el.style.display = "block";
        el.textContent = msg;
      }

      async function generate(e) {
        e.preventDefault();
        const topic = $("topic").value.trim();
        if (!topic) return;
        const key = $("key").value.trim();
        if (key) localStorage.setItem(KEY_STORE, key);

        $("error").style.display = "none";
        $("article").style.display = "none";
        $("tools").style.display = "none";
        $("cover").style.display = "none";
        $("coverTools").style.display = "none";
        $("figureList").style.display = "none";
        $("go").disabled = true;
        renderProgress("research");

        try {
          const res = await fetch("/api/generate", {
            method: "POST",
            headers: {
              "content-type": "application/json",
              ...(key ? { "x-anthropic-api-key": key } : {}),
            },
            body: JSON.stringify({
              topic,
              audience: $("audience").value.trim() || undefined,
              lengthWords: Number($("length").value) || 1500,
            }),
          });

          if (!res.ok || !res.body) {
            const txt = await res.text().catch(() => "");
            throw new Error(txt || `Request failed (${res.status})`);
          }

          // Parse the SSE stream from the POST response.
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";
          while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });
            const chunks = buffer.split("\n\n");
            buffer = chunks.pop() || "";
            for (const chunk of chunks) {
              const ev = /event: (.+)/.exec(chunk)?.[1];
              const dataLine = /data: (.+)/s.exec(chunk)?.[1];
              if (!ev || !dataLine) continue;
              const data = JSON.parse(dataLine);
              if (ev === "progress") renderProgress(data.step);
              else if (ev === "error") showError(data.message);
              else if (ev === "result") showResult(data);
            }
          }
        } catch (err) {
          showError(err.message || String(err));
        } finally {
          $("go").disabled = false;
          $("progress").style.display = "none";
        }
      }

      function showResult(data) {
        lastMarkdown = data.markdown || "";
        lastCoverSvg = data.coverSvg || "";
        if (lastCoverSvg) {
          $("cover").innerHTML = lastCoverSvg;
          $("cover").style.display = "block";
          $("coverTools").style.display = "flex";
        }
        $("article").innerHTML = marked.parse(lastMarkdown);
        $("article").style.display = "block";
        $("tools").style.display = "flex";
        showFigures(data.figures || []);
      }

      function escapeHtml(s) {
        return String(s).replace(/[&<>"]/g, (c) =>
          ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      }

      // List each generated figure with its own PNG/SVG download, labelled by
      // the section it sits under, so you can drop it into your own article.
      function showFigures(figs) {
        lastFigures = figs;
        const box = $("figureList");
        if (!figs.length) {
          box.style.display = "none";
          box.innerHTML = "";
          return;
        }
        box.style.display = "block";
        box.innerHTML =
          '<h3 class="fig-h">Figures</h3>' +
          figs
            .map(
              (f, i) => `<div class="fig-item">
              <div class="fig-preview">${f.svg}</div>
              <div class="fig-actions">
                <span class="fig-label">Under: ${escapeHtml(f.anchor)}</span>
                <span class="fig-btns">
                  <button data-i="${i}" data-fmt="png" type="button">Download PNG</button>
                  <button data-i="${i}" data-fmt="svg" type="button">Download SVG</button>
                </span>
              </div>
            </div>`,
            )
            .join("");
        box.querySelectorAll("button").forEach((b) =>
          b.addEventListener("click", async () => {
            const f = lastFigures[Number(b.dataset.i)];
            const n = Number(b.dataset.i) + 1;
            if (b.dataset.fmt === "svg") {
              downloadBlob(new Blob([f.svg], { type: "image/svg+xml" }), `figure-${n}.svg`);
            } else {
              try {
                downloadBlob(await svgToPng(f.svg, 2000), `figure-${n}.png`);
              } catch {
                showError("Could not render that figure as PNG. The SVG download works.");
              }
            }
          }),
        );
      }

      function downloadBlob(blob, name) {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        URL.revokeObjectURL(a.href);
      }

      // Rasterize the cover SVG to a PNG of the given width, in the browser.
      function svgToPng(svgString, width) {
        return new Promise((resolve, reject) => {
          const url = URL.createObjectURL(
            new Blob([svgString], { type: "image/svg+xml;charset=utf-8" }),
          );
          const img = new Image();
          img.onload = () => {
            const ratio = img.height && img.width ? img.height / img.width : 630 / 1200;
            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = Math.round(width * ratio);
            const ctx = canvas.getContext("2d");
            ctx.fillStyle = "#FAF9FB";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            URL.revokeObjectURL(url);
            canvas.toBlob((blob) => (blob ? resolve(blob) : reject(new Error("toBlob failed"))), "image/png");
          };
          img.onerror = () => {
            URL.revokeObjectURL(url);
            reject(new Error("SVG failed to load"));
          };
          img.src = url;
        });
      }

      $("form").addEventListener("submit", generate);
      $("copy").addEventListener("click", () =>
        navigator.clipboard.writeText(lastMarkdown),
      );
      $("download").addEventListener("click", () =>
        downloadBlob(new Blob([lastMarkdown], { type: "text/markdown" }), "article.md"),
      );
      $("dlSvg").addEventListener("click", () => {
        if (lastCoverSvg) downloadBlob(new Blob([lastCoverSvg], { type: "image/svg+xml" }), "cover.svg");
      });
      $("dlPng").addEventListener("click", async () => {
        if (!lastCoverSvg) return;
        try {
          downloadBlob(await svgToPng(lastCoverSvg, 2400), "cover.png");
        } catch {
          showError("Could not render PNG in this browser. The SVG download works.");
        }
      });
    </script>
  </body>
</html>
